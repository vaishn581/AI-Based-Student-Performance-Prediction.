<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Based Student Performance Prediction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🎓 AI-Based Student Performance Prediction</h1>

    <form id="predictionForm">

        <label>Student Name</label>
        <input type="text" id="name" placeholder="Enter student name">

        <label>Study Hours</label>
        <input type="number" id="study_hours" placeholder="Enter study hours">

        <label>Attendance (%)</label>
        <input type="number" id="attendance" placeholder="Enter attendance">

        <label>Previous Marks</label>
        <input type="number" id="previous_marks" placeholder="Enter previous marks">

        <button type="submit">Predict Performance</button>

    </form>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
